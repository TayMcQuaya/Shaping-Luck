<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shaping Luck — Launch Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0a10;
        --card: #111118;
        --card-hover: #16161f;
        --border: #1e1e2a;
        --gold: #c4a44e;
        --gold-dim: #8a7535;
        --blue: #4a8fd4;
        --blue-dim: #2a5a8a;
        --red: #d4603a;
        --red-dim: #8a4025;
        --green: #3ad47a;
        --purple: #9b3ad4;
        --text: #b0aec0;
        --text-dim: #5a586a;
        --white: #eeedf2;
        --sans: "DM Sans", system-ui, sans-serif;
        --mono: "DM Mono", monospace;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--sans);
        font-size: 15px;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
      }

      .container {
        max-width: 960px;
        margin: 0 auto;
        padding: 48px 24px;
      }

      /* === HEADER === */
      .header-label {
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: var(--gold-dim);
        margin-bottom: 8px;
      }

      h1 {
        font-size: 28px;
        font-weight: 700;
        color: var(--white);
        margin-bottom: 6px;
      }

      .header-sub {
        font-size: 13px;
        color: var(--text-dim);
        margin-bottom: 32px;
      }

      /* === STATS ROW === */
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 10px;
        margin-bottom: 32px;
      }

      .stat-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 14px 10px;
        text-align: center;
      }

      .stat-value {
        font-size: 22px;
        font-weight: 700;
        color: var(--white);
      }

      .stat-label {
        font-size: 9px;
        font-family: var(--mono);
        letter-spacing: 1px;
        text-transform: uppercase;
        color: var(--text-dim);
        margin-top: 2px;
      }

      /* === MAIN TABS === */
      .main-tabs {
        display: flex;
        gap: 0;
        margin-bottom: 0;
        border: 1px solid var(--border);
        border-bottom: none;
        border-radius: 10px 10px 0 0;
        overflow: hidden;
      }

      .main-tab {
        flex: 1;
        padding: 14px 10px;
        background: var(--card);
        border: none;
        border-right: 1px solid var(--border);
        color: var(--text-dim);
        font-family: var(--sans);
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        text-align: center;
        letter-spacing: 0.3px;
      }

      .main-tab:last-child {
        border-right: none;
      }
      .main-tab:hover {
        background: var(--card-hover);
        color: var(--text);
      }
      .main-tab.active {
        background: var(--gold);
        color: var(--bg);
      }
      .main-tab.active-blue {
        background: var(--blue);
        color: var(--bg);
      }
      .main-tab.active-red {
        background: var(--red);
        color: var(--bg);
      }
      .main-tab.active-green {
        background: var(--green);
        color: var(--bg);
      }
      .main-tab.active-purple {
        background: var(--purple);
        color: var(--bg);
      }

      .tab-content {
        border: 1px solid var(--border);
        border-radius: 0 0 10px 10px;
        padding: 24px;
        background: var(--bg);
        min-height: 400px;
      }

      /* === VOICE TOGGLE === */
      .voice-toggle {
        display: flex;
        gap: 0;
        margin-bottom: 24px;
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
      }

      .voice-btn {
        flex: 1;
        padding: 10px 16px;
        background: var(--card);
        border: none;
        color: var(--text-dim);
        font-family: var(--sans);
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        text-align: center;
      }

      .voice-btn:hover {
        background: var(--card-hover);
        color: var(--text);
      }
      .voice-btn.active-salim {
        background: var(--gold);
        color: var(--bg);
      }
      .voice-btn.active-john {
        background: var(--blue);
        color: var(--bg);
      }

      /* === TIMELINE === */
      .timeline {
        position: relative;
        padding-left: 28px;
      }

      .timeline::before {
        content: "";
        position: absolute;
        left: 5px;
        top: 0;
        bottom: 0;
        width: 1px;
        background: var(--border);
      }

      .week-group {
        margin-bottom: 32px;
        position: relative;
      }

      .week-label {
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--text-dim);
        margin-bottom: 14px;
        padding-left: 4px;
      }

      /* === EMAIL CARDS === */
      .email-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
        margin-bottom: 10px;
        overflow: hidden;
        transition: border-color 0.2s;
        position: relative;
      }

      .email-card::before {
        content: "";
        position: absolute;
        left: -24px;
        top: 22px;
        width: 11px;
        height: 11px;
        border-radius: 50%;
        border: 2px solid var(--border);
        background: var(--bg);
        z-index: 1;
      }

      .email-card.type-email::before {
        border-color: var(--gold-dim);
      }
      .email-card.type-task::before {
        border-color: var(--blue-dim);
      }
      .email-card.type-action::before {
        border-color: var(--red-dim);
      }
      .email-card.type-milestone::before {
        border-color: var(--purple);
        background: var(--purple);
      }

      .email-card:hover {
        border-color: #2a2a3a;
      }

      .email-header {
        padding: 14px 18px;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        user-select: none;
      }

      .email-meta {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text-dim);
        margin-bottom: 4px;
      }

      .email-subject {
        font-size: 14px;
        font-weight: 600;
        color: var(--white);
        line-height: 1.3;
      }

      .email-purpose {
        font-size: 11px;
        color: var(--text-dim);
        margin-top: 4px;
        font-style: italic;
      }

      .email-chevron {
        color: var(--text-dim);
        font-size: 16px;
        transition: transform 0.2s;
        flex-shrink: 0;
        margin-left: 12px;
        margin-top: 4px;
      }

      .email-chevron.open {
        transform: rotate(90deg);
      }

      .email-body {
        padding: 0 18px 18px;
        display: none;
      }
      .email-body.visible {
        display: block;
      }

      .email-body-content {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 20px;
        font-size: 13px;
        line-height: 1.8;
        color: var(--text);
        white-space: pre-wrap;
      }

      .email-body-content strong {
        color: var(--white);
        font-weight: 600;
      }

      .email-notes {
        margin-top: 10px;
        padding: 10px 14px;
        background: #1a1a25;
        border-radius: 6px;
        font-size: 11px;
        color: var(--text-dim);
        line-height: 1.6;
      }

      .email-notes::before {
        content: "// ";
        color: var(--gold-dim);
        font-family: var(--mono);
      }

      /* === BADGES === */
      .badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 4px;
        font-family: var(--mono);
        font-size: 9px;
        letter-spacing: 1px;
        text-transform: uppercase;
        font-weight: 500;
        margin-left: 6px;
        vertical-align: middle;
      }

      .badge-slow {
        background: #1a2a1a;
        color: #4a8a4a;
      }
      .badge-medium {
        background: #2a2a1a;
        color: #c4a44e;
      }
      .badge-fast {
        background: #2a1a1a;
        color: #d46a4a;
      }

      .status-badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 4px;
        font-family: var(--mono);
        font-size: 9px;
        letter-spacing: 1px;
        font-weight: 600;
        flex-shrink: 0;
      }

      .status-draft {
        background: #e8a83822;
        color: #e8a838;
      }
      .status-todo {
        background: #ffffff11;
        color: #888;
      }
      .status-done {
        background: #3ad47a22;
        color: #3ad47a;
      }

      .cta-tag {
        display: inline-block;
        padding: 2px 7px;
        border-radius: 3px;
        font-family: var(--mono);
        font-size: 8px;
        letter-spacing: 1px;
        text-transform: uppercase;
        font-weight: 500;
        margin-right: 4px;
        margin-top: 6px;
      }

      .cta-book {
        background: #1a2a1a;
        color: var(--green);
      }
      .cta-webinar {
        background: #1a1a2a;
        color: var(--blue);
      }
      .cta-urgency {
        background: #2a1a1a;
        color: var(--red);
      }

      /* === DEV TRACK === */
      .dev-block {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 20px;
        margin-bottom: 12px;
      }

      .dev-week {
        font-size: 14px;
        font-weight: 600;
        color: var(--blue);
      }

      .dev-date {
        font-size: 11px;
        color: var(--text-dim);
      }

      .dev-item {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        margin-top: 10px;
      }

      .dev-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--blue);
        margin-top: 7px;
        flex-shrink: 0;
      }

      .dev-item-text {
        font-size: 13px;
        color: #bbb;
        line-height: 1.5;
      }

      /* === BUDGET === */
      .budget-section {
        margin-bottom: 24px;
      }
      .budget-section-title {
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--green);
        margin-bottom: 14px;
      }
      .budget-table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 8px;
      }
      .budget-table th {
        text-align: left;
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: var(--text-dim);
        padding: 8px 12px;
        border-bottom: 1px solid var(--border);
      }
      .budget-table td {
        padding: 10px 12px;
        font-size: 13px;
        border-bottom: 1px solid var(--border);
      }
      .budget-table tr:last-child td {
        border-bottom: none;
      }
      .budget-table .budget-amount {
        color: var(--green);
        font-weight: 600;
        font-family: var(--mono);
      }
      .budget-table .budget-pct {
        color: var(--gold);
        font-weight: 600;
        font-family: var(--mono);
      }
      .budget-table .budget-label {
        color: var(--white);
        font-weight: 500;
      }
      .budget-table .budget-note {
        color: var(--text-dim);
        font-size: 12px;
      }
      .projection-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        margin-bottom: 8px;
      }
      .projection-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 18px;
        position: relative;
        overflow: hidden;
      }
      .projection-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
      }
      .projection-card.conservative::before {
        background: var(--text-dim);
      }
      .projection-card.target::before {
        background: var(--gold);
      }
      .projection-card.stretch::before {
        background: var(--green);
      }
      .projection-tier {
        font-family: var(--mono);
        font-size: 9px;
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 10px;
      }
      .projection-card.conservative .projection-tier {
        color: var(--text-dim);
      }
      .projection-card.target .projection-tier {
        color: var(--gold);
      }
      .projection-card.stretch .projection-tier {
        color: var(--green);
      }
      .projection-gross {
        font-size: 26px;
        font-weight: 700;
        color: var(--white);
        margin-bottom: 4px;
        font-family: var(--mono);
      }
      .projection-breakdown {
        font-size: 11px;
        color: var(--text-dim);
        line-height: 1.6;
        margin-bottom: 14px;
        padding-bottom: 14px;
        border-bottom: 1px solid var(--border);
      }
      .projection-row {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        padding: 4px 0;
      }
      .projection-row-label {
        color: var(--text-dim);
      }
      .projection-row-value {
        color: var(--text);
        font-family: var(--mono);
        font-weight: 500;
      }
      .projection-row.highlight .projection-row-value {
        color: var(--green);
        font-weight: 700;
      }
      .projection-row.deduct .projection-row-value {
        color: var(--red);
      }
      .projection-divider {
        border: none;
        border-top: 1px solid var(--border);
        margin: 6px 0;
      }
      @media (max-width: 768px) {
        .projection-grid {
          grid-template-columns: 1fr;
        }
      }
      .budget-flow {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 20px;
        font-family: var(--mono);
        font-size: 12px;
        line-height: 1.8;
        color: var(--text);
        white-space: pre;
        overflow-x: auto;
      }
      .budget-note-list {
        list-style: none;
        padding: 0;
      }
      .budget-note-list li {
        font-size: 13px;
        color: var(--text);
        padding: 6px 0;
        padding-left: 16px;
        position: relative;
      }
      .budget-note-list li::before {
        content: "";
        position: absolute;
        left: 0;
        top: 13px;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--green);
      }

      /* === OVERVIEW === */
      .overview-section {
        margin-bottom: 24px;
      }

      .overview-section-title {
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--gold);
        margin-bottom: 12px;
      }

      .flow-pre {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 20px;
        font-family: var(--mono);
        font-size: 11px;
        line-height: 1.6;
        color: var(--text);
        overflow-x: auto;
        white-space: pre;
      }

      .state-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }

      .state-table th {
        background: var(--card);
        color: var(--gold);
        font-family: var(--mono);
        font-size: 9px;
        letter-spacing: 1px;
        text-transform: uppercase;
        padding: 10px 12px;
        text-align: left;
        border-bottom: 1px solid var(--border);
      }

      .state-table td {
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        color: var(--text);
      }

      .state-table tr:hover td {
        background: var(--card);
      }

      .track-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 14px 16px;
        margin-bottom: 8px;
        display: flex;
        align-items: flex-start;
        gap: 12px;
      }

      .track-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        margin-top: 4px;
        flex-shrink: 0;
      }

      .track-card-title {
        font-size: 13px;
        font-weight: 600;
        color: var(--white);
      }

      .track-card-meta {
        font-size: 11px;
        color: var(--text-dim);
        margin-top: 2px;
      }

      .transition-block {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 16px 20px;
        margin-bottom: 10px;
      }

      .transition-title {
        font-size: 12px;
        font-weight: 600;
        color: var(--white);
        margin-bottom: 8px;
      }

      .transition-rule {
        font-size: 12px;
        color: var(--text-dim);
        line-height: 1.7;
      }

      /* === NOTES PANEL === */
      .notes-panel {
        margin-top: 32px;
        padding: 20px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
      }

      .notes-title {
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 10px;
      }

      .notes-body {
        font-size: 12px;
        color: var(--text-dim);
        line-height: 1.7;
      }

      /* === TRACK INFO BOX === */
      .track-info {
        margin-bottom: 20px;
        padding: 14px 18px;
        background: #12121e;
        border: 1px solid var(--border);
        border-radius: 8px;
      }

      .track-info-label {
        font-size: 11px;
        font-weight: 600;
        margin-bottom: 6px;
        font-family: var(--mono);
        letter-spacing: 1px;
      }

      .track-info-body {
        font-size: 12px;
        color: var(--text-dim);
        line-height: 1.7;
      }

      /* === SECTION ACCORDION === */
      .section-block {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
        margin-bottom: 12px;
        overflow: hidden;
      }

      .section-header {
        padding: 16px 20px;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;
        user-select: none;
      }

      .section-header:hover {
        background: var(--card-hover);
      }

      .section-body {
        padding: 0 20px 20px;
      }

      /* === RESPONSIVE === */
      @media (max-width: 768px) {
        .stats-grid {
          grid-template-columns: repeat(3, 1fr);
        }
        .main-tabs {
          flex-wrap: wrap;
        }
        .main-tab {
          flex: 1 1 48%;
        }
      }

      @media (max-width: 480px) {
        .stats-grid {
          grid-template-columns: repeat(2, 1fr);
        }
        .main-tab {
          flex: 1 1 100%;
        }
      }

      /* === RESOURCES TAB === */
      .res-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-bottom: 24px;
      }

      .res-group-title {
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--text-dim);
        margin-bottom: 10px;
        padding-top: 16px;
        border-top: 1px solid var(--border);
      }

      .res-group-title:first-child {
        border-top: none;
        padding-top: 0;
      }

      .res-card {
        display: block;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 16px;
        text-decoration: none;
        transition: all 0.2s;
        cursor: pointer;
      }

      .res-card:hover {
        background: var(--card-hover);
        border-color: var(--gold-dim);
        transform: translateY(-1px);
      }

      .res-card-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 6px;
      }

      .res-badge {
        font-family: var(--mono);
        font-size: 9px;
        letter-spacing: 1px;
        text-transform: uppercase;
        padding: 2px 8px;
        border-radius: 4px;
        font-weight: 500;
      }

      .res-badge.html {
        background: rgba(74, 143, 212, 0.15);
        color: var(--blue);
      }
      .res-badge.md {
        background: rgba(196, 164, 78, 0.15);
        color: var(--gold);
      }
      .res-badge.jsx {
        background: rgba(155, 58, 212, 0.15);
        color: var(--purple);
      }

      .res-title {
        font-size: 14px;
        font-weight: 600;
        color: var(--white);
      }

      .res-desc {
        font-size: 12px;
        color: var(--text-dim);
        line-height: 1.5;
      }

      @media (max-width: 768px) {
        .res-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header-label">Phase 1 — Private Launch</div>
      <h1>Shaping Luck Launch Dashboard</h1>
      <p class="header-sub">
        Mar 5 &rarr; ongoing &middot; 8 email tracks &middot; 6 user states
        &middot; All sequences in one place
      </p>

      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value">8</div>
          <div class="stat-label">Email Tracks</div>
        </div>
        <div class="stat-card">
